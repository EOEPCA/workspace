{{- define "wp.environmentconfig.data" -}}
data:
  iam:
    realm: {{ .Values.environmentconfig.iam.realm | default "" | quote }}
    {{- with .Values.environmentconfig.iam.extraAudiences }}
    extraAudiences:
{{- toYaml . | nindent 6 }}
    {{- end }}

  ingress:
    class: {{ .Values.environmentconfig.ingress.class | default "" | quote }}
    domain: {{ .Values.environmentconfig.ingress.domain | default "" | quote }}
    secret: {{ .Values.environmentconfig.ingress.secret | default "" | quote }}

  storage:
    endpoint: {{ .Values.environmentconfig.storage.endpoint | default "" | quote }}
    force_path_style: {{ toString (default true .Values.environmentconfig.storage.forcePathStyle) | quote }}
    provider: {{ .Values.environmentconfig.storage.provider | default "" | quote }}
    region: {{ .Values.environmentconfig.storage.region | default "" | quote }}
    secretNamespace: {{ .Values.environmentconfig.storage.secretNamespace | default "" | quote }}
    type: {{ .Values.environmentconfig.storage.type | default "" | quote }}
    {{- $lifecycleSchedule := .Values.environmentconfig.storage.lifecycle.schedule | default "" }}
    {{- if ne (toString $lifecycleSchedule) "" }}
    lifecycle:
      schedule: {{ toString $lifecycleSchedule | quote }}
    {{- end }}

  {{- with .Values.environmentconfig.storageClasses.allowed }}
  storageClasses:
    allowed:
{{- toYaml . | nindent 6 }}
  {{- end }}

  network:
    {{- with .Values.environmentconfig.network.externalEgressCIDRs }}
    externalEgressCIDRs:
{{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.environmentconfig.network.internalEgress }}
    internalEgress:
{{- toYaml . | nindent 6 }}
    {{- end }}
    serviceCIDR: {{ .Values.environmentconfig.network.serviceCIDR | default "" | quote }}
    {{- with .Values.environmentconfig.network.podCIDRs }}
    podCIDRs:
{{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.environmentconfig.network.blacklistIPs }}
    blacklistIPs:
{{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.environmentconfig.network.excludePolicies }}
    excludePolicies:
{{- toYaml . | nindent 6 }}
    {{- end }}

  {{- with .Values.environmentconfig.packages }}
  packages:
{{ toYaml . | nindent 4 }}
  {{- end }}

  {{- $auth := dict }}
  {{- range $k, $v := (.Values.environmentconfig.auth | default dict) }}
    {{- if or (kindIs "bool" $v) (ne (toString $v) "") }}
      {{- $_ := set $auth $k $v }}
    {{- end }}
  {{- end }}
  {{- if $auth }}
  auth:
{{- toYaml $auth | nindent 4 }}
  {{- end }}

  {{- $defaults := .Values.environmentconfig.defaults | default dict }}
  {{- $quota := dict }}
  {{- range $k, $v := ($defaults.quota | default dict) }}
    {{- if or (kindIs "bool" $v) (ne (toString $v) "") }}
      {{- $_ := set $quota $k $v }}
    {{- end }}
  {{- end }}
  {{- $overallQuota := dict }}
  {{- range $k, $v := ($defaults.overallQuota | default dict) }}
    {{- if or (kindIs "bool" $v) (ne (toString $v) "") }}
      {{- $_ := set $overallQuota $k $v }}
    {{- end }}
  {{- end }}
  {{- $security := dict }}
  {{- range $k, $v := ($defaults.security | default dict) }}
    {{- if or (kindIs "bool" $v) (ne (toString $v) "") }}
      {{- $_ := set $security $k $v }}
    {{- end }}
  {{- end }}
  {{- if or $quota (or $overallQuota $security) }}
  defaults:
    {{- if $quota }}
    quota:
{{- toYaml $quota | nindent 6 }}
    {{- end }}

    {{- if $overallQuota }}
    overallQuota:
{{- toYaml $overallQuota | nindent 6 }}
    {{- end }}

    {{- if $security }}
    security:
{{- toYaml $security | nindent 6 }}
    {{- end }}
  {{- end }}

  {{- $database := .Values.environmentconfig.database | default dict }}
  {{- $gateway := dict }}
  {{- range $k, $v := ($database.gateway | default dict) }}
    {{- if or (kindIs "bool" $v) (ne (toString $v) "") }}
      {{- $_ := set $gateway $k (toString $v) }}
    {{- end }}
  {{- end }}
  {{- $storageClassName := get $database "storageClassName" }}
  {{- $backupStorageClassName := get $database "backupStorageClassName" }}
  {{- if or $gateway (or (or (kindIs "bool" $storageClassName) (ne (toString $storageClassName) "")) (or (kindIs "bool" $backupStorageClassName) (ne (toString $backupStorageClassName) ""))) }}
  database:
    {{- if $gateway }}
    gateway:
{{- toYaml $gateway | nindent 6 }}
    {{- end }}

    {{- if or (kindIs "bool" $storageClassName) (ne (toString $storageClassName) "") }}
    storageClassName: {{ toString $storageClassName | quote }}
    {{- end }}

    {{- if or (kindIs "bool" $backupStorageClassName) (ne (toString $backupStorageClassName) "") }}
    backupStorageClassName: {{ toString $backupStorageClassName | quote }}
    {{- end }}
  {{- end }}

  {{- range $section := list "mongodb" "redis" "qdrant" }}
    {{- $cfg := get $.Values.environmentconfig $section | default dict }}
    {{- $backendStorageClassName := get $cfg "storageClassName" }}
    {{- if or (kindIs "bool" $backendStorageClassName) (ne (toString $backendStorageClassName) "") }}
  {{ $section }}:
    storageClassName: {{ toString $backendStorageClassName | quote }}
    {{- end }}
  {{- end }}
{{- end -}}
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: {{ .Values.environmentconfig.name | default "datalab" | quote }}
  {{- include "wp.annotations.block" (dict "global" .Values.globalAnnotations "local" .Values.environmentconfig.annotations) | nindent 2 }}
{{ include "wp.environmentconfig.data" . }}
