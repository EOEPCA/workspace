###########
# Storage #
###########
apiVersion: pkg.internal/v1beta1
kind: Storage
metadata:
  name: ws-alice
  namespace: workspace
  labels:
    storages.pkg.internal/environment: datalab
spec:
  principal: ws-alice
  credentialsRollover:
    interval: weekly
    maxToKeep: 2
  buckets:
    - bucketName: ws-alice
      discoverable: true
    - bucketName: ws-alice-2
      discoverable: true
    - bucketName: ws-alice-3
      discoverable: true
  bucketAccessGrants:
    - bucketName: ws-alice-3
      grantee: ws-eric
      permission: ReadWrite
      grantedAt: "2025-10-14T08:09:10.817000+00:00"
  bucketAccessRequests:
    - bucketName: ws-eric-shared
      reason: requesting access
      requestedAt: "2025-10-19T13:25:59.655000+00:00"

---
apiVersion: pkg.internal/v1beta1
kind: Storage
metadata:
  name: ws-bob
  namespace: workspace
  labels:
    storages.pkg.internal/environment: datalab
spec:
  principal: ws-bob
  buckets:
    - bucketName: ws-bob
      discoverable: true
      lifecycleRules:
        - target: tmp/*
          mode: Delete
          minAge: 12h
        - target: scratch/*
          mode: Notify
          minAge: 1w
---
apiVersion: pkg.internal/v1beta1
kind: Storage
metadata:
  name: ws-eric
  namespace: workspace
  labels:
    storages.pkg.internal/environment: datalab
spec:
  principal: ws-eric
  buckets:
    - bucketName: ws-eric
      discoverable: true
    - bucketName: ws-eric-shared
      discoverable: true
  bucketAccessGrants:
    - bucketName: ws-eric-shared
      grantee: ws-alice
      permission: ReadWrite
      grantedAt: "2025-10-19T13:28:45.636000+00:00"
  bucketAccessRequests:
    - bucketName: ws-alice-3
      reason: requesting access
      requestedAt: "2025-10-14T08:08:53.953000+00:00"
---
###########
# Datalab #
###########
apiVersion: pkg.internal/v1beta2
kind: Datalab
metadata:
  name: ws-alice
  namespace: workspace
  labels:
    datalabs.pkg.internal/environment: datalab
spec:
  users:
    - alice  
  secretName: ws-alice
  sessions:
    - name: default
      state: stopped
  vcluster: true
  data:
    readOnlyMount: true
  registry:
    enabled: true
    storage: 3Gi
---
apiVersion: pkg.internal/v1beta2
kind: Datalab
metadata:
  name: ws-bob
  namespace: workspace
  labels:
    datalabs.pkg.internal/environment: datalab
spec:
  users:
    - bob
    - alice
  userOverrides:
    alice:
      grantedAt: "2025-10-15T08:08:53.953000+00:00"
      role: user
  secretName: ws-bob
  sessions:
    - name: default
      state: stopped
  quota:
    memory: 6Gi
    storage: 1Gi
    budget: x-large
  vcluster: true
  data:
    enabled: false
  security:
    kubernetesAccess: false
  registry:
    enabled: true
    storage: 3Gi
  documentStores:
    prod:
      storage: 1Gi
  cacheStores:
    prod:
      storage: 1Gi
  vectorStores:
    prod:
      storage: 1Gi
  databases:
    pg0:
      names:
      - dev
      - prod
      storage: 1Gi
      backupStorage: 10Gi
---
apiVersion: pkg.internal/v1beta2
kind: Datalab
metadata:
  name: ws-eric
  namespace: workspace
  labels:
    datalabs.pkg.internal/environment: datalab
spec:
  users:
    - eric
  secretName: ws-eric
  sessions:
    - name: default
      state: stopped
  vcluster: false
  registry:
    enabled: true
    storage: 3Gi
